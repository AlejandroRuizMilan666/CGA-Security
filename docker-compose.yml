services:
  postgres:
    image: postgres:16-alpine
    container_name: cga-security-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cga_security}
      POSTGRES_USER: ${POSTGRES_USER:-cga_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cga_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cga_app} -d ${POSTGRES_DB:-cga_security}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
